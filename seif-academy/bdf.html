<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة ملفات PDF - أكاديمية سيف</title>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 30px;
        }
        h1 {
            color: #2e66ff;
        }
        .control-panel {
            background-color: #141b2d;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            margin: 20px auto;
            border: 1px solid #1f293d;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccd4e0;
            background-color: #1a233a;
            color: white;
        }
        button {
            padding: 10px 20px;
            background-color: #2e66ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #1a4fd4;
        }
        .file-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .file-item {
            background-color: #1c2438;
            padding: 15px;
            border-radius: 6px;
            width: 80%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #57ccff;
        }
        .delete-btn {
            background-color: #ff4d4d;
        }
        .delete-btn:hover {
            background-color: #cc2424;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #57ccff;
            color: #0b0f19;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>إدارة ملفات المذكرات والـ PDF 📚</h1>
    
    <div class="control-panel">
        <h3>إضافة ملف جديد</h3>
        <input type="text" id="fileTitle" placeholder="اكتب اسم الملف أو المذكرة هنا...">
        <input type="text" id="fileLink" placeholder="ضع رابط تحميل الملف (جوجل درايف مثلاً)...">
        <br>
        <button onclick="addFile()">إضافة الملف</button>
    </div>

    <div class="file-list" id="fileContainer"></div>

    <br>
  <a href="../index.html" class="back-btn">العودة للرئيسية</a>
    <script>
        function displayFiles() {
            const container = document.getElementById('fileContainer');
            container.innerHTML = '';
            let files = JSON.parse(localStorage.getItem('myFiles')) || [];
            
            files.forEach((file, index) => {
                container.innerHTML += `
                    <div class="file-item">
                        <div>
                            <strong>${file.title}</strong> <br>
                            <a href="${file.link}" target="_blank" style="color: #57ccff; text-decoration: none; font-size: 14px;">اضغط هنا لتحميل الملف</a>
                        </div>
                        <button class="delete-btn" onclick="deleteFile(${index})">حذف</button>
                    </div>
                `;
            });
        }

        function addFile() {
            const titleInput = document.getElementById('fileTitle');
            const linkInput = document.getElementById('fileLink');
            
            if(titleInput.value.trim() === '' || linkInput.value.trim() === '') {
                alert('من فضلك املأ خانة اسم الملف والرابط!');
                return;
            }

            let files = JSON.parse(localStorage.getItem('myFiles')) || [];
            files.push({ title: titleInput.value, link: linkInput.value });
            localStorage.setItem('myFiles', JSON.stringify(files));
            
            titleInput.value = '';
            linkInput.value = '';
            displayFiles();
        }

        function deleteFile(index) {
            let files = JSON.parse(localStorage.getItem('myFiles')) || [];
            files.splice(index, 1);
            localStorage.setItem('myFiles', JSON.stringify(files));
            displayFiles();
        }

        displayFiles();
    </script>
</body>
</html>
