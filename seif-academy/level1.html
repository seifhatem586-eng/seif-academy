    </div> <div id="videoModal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4">
        <div class="relative w-full max-w-4xl aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-700">
            <button onclick="closeVideo()" class="absolute top-4 right-4 text-white bg-red-600 w-10 h-10 rounded-full z-10 hover:bg-red-700 transition flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
            <iframe id="videoFrame" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

<script>
    function openVideo(videoLink) {
        const modal = document.getElementById('videoModal');
        const frame = document.getElementById('videoFrame');
        
        // تحويل لينك اليوتيوب العادي لـ Embed عشان يشتغل جوه موقعك
        let videoId = "";
        if (videoLink.includes("v=")) {
            videoId = videoLink.split("v=")[1].split("&")[0];
        } else if (videoLink.includes("youtu.be/")) {
            videoId = videoLink.split("youtu.be/")[1].split("?")[0];
        }
        
        frame.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&rel=0";
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // يمنع السكرول وأنت بتتفرج
    }

    function closeVideo() {
        const modal = document.getElementById('videoModal');
        const frame = document.getElementById('videoFrame');
        frame.src = ""; 
        modal.classList.add('hidden');
        document.body.style.overflow = 'auto'; // يرجع السكرول لما تقفل
    }

    // يقفل لو ضغطت في أي حتة بره الفيديو
    document.getElementById('videoModal').onclick = function(e) {
        if(e.target === this) closeVideo();
    }
</script>
