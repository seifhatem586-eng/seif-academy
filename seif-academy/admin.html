<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن | سيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 30px; color: #58a6ff; }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 10px 0; color: #8b949e; }
        .card .value { font-size: 24px; font-weight: bold; color: #ff7b72; }
        .card .value.safe { color: #56d364; }
        table { width: 100%; border-collapse: collapse; background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #30363d; }
        th { background-color: #21262d; color: #58a6ff; }
        tr:hover { background-color: #21262d; }
        .badge-danger { background-color: #f85149; color: white; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-user-shield"></i> لوحة تحكم الأكاديمية السرية</h2>
        <p>تحليل البيانات والرقابة الفورية</p>
    </div>

    <div class="stats-container">
        <div class="card">
            <h3><i class="fas fa-exclamation-triangle" style="color:#ff7b72;"></i> إجمالي المخالفات رُصدت</h3>
            <div class="value" id="total-violations">جاري التحميل...</div>
        </div>
        <div class="card">
            <h3><i class="fas fa-user-slash" style="color:#ff7b72;"></i> الطالب الأكثر مخالفة</h3>
            <div class="value" id="top-offender" style="font-size:18px;">جاري التحميل...</div>
        </div>
        <div class="card">
            <h3><i class="fas fa-users" style="color:#56d364;"></i> إجمالي حركات النشاط</h3>
            <div class="value safe" id="total-logs">جاري التحميل...</div>
        </div>
    </div>

    <h3><i class="fas fa-history"></i> آخر محاولات الاختراق والتصوير</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>رقم الطالب (الموبايل)</th>
                    <th>التاريخ والوقت</th>
                    <th>الحالة / الحركة</th>
                </tr>
            </thead>
            <tbody id="log-table-body"></tbody>
        </table>
    </div>

    <script>
        // حماية الصفحة برقم سري أول ما تفتح
        const password = prompt("أدخل الرقم السري لمدير الإدارة:");
        if (password !== "Seif@2026") { 
            alert("عذراً، ليس لديك صلاحية لدخول هذه الصفحة!");
            window.location.href = "index.html"; 
        }

        // رابط الجوجل شيت اللي نسخته بصيغة CSV
        const sheetCsvUrl = "حط_رابط_الجوجل_شيت_بتاعك_هنا";

        async function fetchAndAnalyzeData() {
            try {
                const response = await fetch(sheetCsvUrl);
                const data = await response.text();
                const rows = data.split("\n").map(row => row.split(","));
                let totalLogs = 0, totalViolations = 0, suspectList = {}, tableHtml = "";

                for (let i = rows.length - 1; i >= 1; i--) {
                    if (rows[i].length < 3) continue;
                    let studentId = rows[i][0]?.replace(/"/g, '').trim();
                    let dateTime = rows[i][1]?.replace(/"/g, '').trim();
                    let action = rows[i][2]?.replace(/"/g, '').trim();
                    if(!studentId) continue;
                    totalLogs++;

                   if (action && (action.includes("تصوير") || action.includes("شاشة") || action.includes("مخالفة"))) {
                        totalViolations++;
                        suspectList[studentId] = (suspectList[studentId] || 0) + 1;
                        tableHtml += `<tr><td><b>${studentId}</b></td><td style="direction: ltr; text-align: right;">${dateTime}</td><td><span class="badge-danger">${action}</span></td></tr>`;
                    }
                }

                let topOffender = "لا يوجد", maxViolations = 0;
                for (let student in suspectList) {
                    if (suspectList[student] > maxViolations) {
                        maxViolations = suspectList[student];
                        topOffender = `${student} (${maxViolations} محاولات)`;
                    }
                }

                document.getElementById("total-logs").innerText = totalLogs;
                document.getElementById("total-violations").innerText = totalViolations;
                document.getElementById("top-offender").innerText = topOffender;
                document.getElementById("log-table-body").innerHTML = tableHtml || "<tr><td colspan='3' style='text-align:center;'>لا توجد مخالفات مسجلة!</td></tr>";
            } catch (error) {
                console.error(error);
            }
        }
        fetchAndAnalyzeData();
        setInterval(fetchAndAnalyzeData, 30000);
    </script>
</body>
</html>
