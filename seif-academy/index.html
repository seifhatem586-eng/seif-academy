    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111e; color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* شاشة تسجيل الدخول */
        #gate { background: #161d2b; padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 1000; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #2a3547; background: #0b111e; color: white; text-align: center; font-size: 16px; }
        .btn-go { width: 100%; padding: 14px; background: #2e66ff; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }

        /* المنصة الأصلية S.A.B */
        #content { display: none; width: 100%; max-width: 500px; animation: fadeIn 0.5s; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-tag { background: #1e2638; padding: 8px 15px; border-radius: 10px; font-weight: bold; font-size: 20px; }
        
        .hero { text-align: center; margin-bottom: 30px; }
        .hero h1 { color: #57ccff; font-size: 26px; margin-bottom: 5px; }
        .hero h2 { font-size: 34px; margin: 0; }
        .hero p { color: #8a96a3; font-size: 14px; line-height: 1.6; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; }
        .stat-box { background: #161d2b; padding: 20px 10px; border-radius: 18px; text-align: center; border: 1px solid #1e2638; }
        .stat-box h3 { font-size: 28px; margin: 0; color: #57ccff; }
        .stat-box span { font-size: 12px; color: #636e7b; display: block; margin-top: 5px; }

        .class-list h3 { font-size: 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .class-item { background: #161d2b; padding: 18px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; transition: 0.3s; border: 1px solid transparent; }
        .class-item:hover { transform: scale(1.02); border-color: #2e66ff; }
        .active-blue { background: linear-gradient(90deg, #2e66ff, #6c5ce7); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="gate">
        <h2 style="color: #57ccff;"> اكادميه دكتور سيف التعليميه</h2>
        <input type="tel" id="u" placeholder="رقم الهاتف">
        <input type="tel" id="p" placeholder="تأكيد الرقم">
        <button class="btn-go" onclick="login()">خُش برجلك اليمين</button>
    </div>

    <div id="content">
        <div class="top-bar">
            <div class="logo-tag">S.A.B</div>
            <i class="fas fa-bars" style="font-size: 24px;"></i>
        </div>

        <div class="hero">
            <h1>اكاديميه سيف التعليميه</h1>
            <h2>تخصص BIS</h2>
            <p>طريقك للنجاح يبدأ من هنا، خبرة 6 سنين في مجال البرمجة وبقدم لك منصة شروحات جديدة لكل الفرق الدراسية.</p>
        </div>

        <div class="stats">
            <div class="stat-box"><h3>88</h3><span>فيديو</span></div>
            <div class="stat-box"><h3>24</h3><span>ملف PDF</span></div>
            <div class="stat-box"><h3>0</h3><span>بوست</span></div>
        </div>

        <div class="class-list">
            <h3><i class="fas fa-graduation-cap" style="color:#57ccff"></i> اختار فرقتك الدراسية</h3>
            
            <a href="level1.html" class="class-item active-blue">
                <i class="fas fa-book-open"></i> <span>الفرقة الأولى</span>
            </a>
            <a href="level2.html" class="class-item">
                <i class="fas fa-code"></i> <span>الفرقة الثانية</span>
            </a>
            <a href="level3.html" class="class-item">
                <i class="fas fa-microchip"></i> <span>الفرقة الثالثة</span>
            </a>
            <a href="level5.html" class="class-item">
                <i class="fas fa-user-tie"></i> <span>الفرقة الرابعة</span>
            </a>
        </div>
    </div>

function login() {
    const valU = document.getElementById('u').value.trim();
    const valP = document.getElementById('p').value.trim();

    // التحقق إذا كانت الخانات فارغة
    if (valU === "" || valP === "") {
        alert("من فضلك أدخل رقم الهاتف وتأكيده أولاً!");
        return;
    }

    // التحقق من تطابق الرقمين ووجود الرقم في قائمة المشتركين
    if (valU === valP && users.includes(valU)) {
        sessionStorage.setItem('access', 'done');
        render();
    } else { 
        alert("الرقم غير مسجل أو غير متطابق، يرجى التواصل مع دكتور سيف للتفعيل!"); 
    }
}

function render() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

window.onload = function() {
    if (sessionStorage.getItem('access') === 'done') render();
}
