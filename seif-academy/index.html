<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.B - أكاديمية سيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at center, #010409, #000000); /* خلفية سوداء عميقة جداً */
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        /* شاشة تسجيل الدخول بنمط النيون الملكي */
        #gate { 
            background: rgba(11, 17, 30, 0.8); 
            backdrop-filter: blur(5px);
            border: 2px solid #00d4ff; /* إطار نيون لبني */
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.3); /* توهج نيون خفيف */
            z-index: 1000; 
        }

        #gate h2 { 
            color: #fff; 
            font-size: 26px; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            text-shadow: 0 0 10px #00d4ff; /* العنوان مضيء */
        }

        #gate input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            color: white; 
            font-size: 16px; 
            outline: none; 
            transition: 0.3s; 
            box-sizing: border-box; 
            text-align: center;
        }

        #gate input:focus { 
            border-color: #00d4ff; 
            background: rgba(255, 255, 255, 0.1); 
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.15);
        }

        .btn-go { 
            width: 100%; 
            padding: 15px; 
            margin-top: 20px; 
            background: linear-gradient(45deg, #00d4ff, #2e66ff); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.4s; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); 
            text-transform: uppercase;
        }

        .btn-go:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4); 
            filter: brightness(1.1);
        }

        /* المنصة الأصلية S.A.B بعد الدخول */
        #content { 
            display: none; 
            width: 100%; 
            max-width: 500px; 
            animation: fadeIn 0.8s ease-out; 
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-tag { 
            background: rgba(0, 212, 255, 0.1); 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 22px; 
            border: 1px solid rgba(0, 212, 255, 0.2); 
            color: #00d4ff;
        }
        
        .hero { text-align: center; margin-bottom: 30px; }
        .hero h1 { color: #57ccff; font-size: 24px; margin-bottom: 5px; }
        .hero h2 { font-size: 36px; margin: 0; text-shadow: 0 0 15px #00d4ff; }
        .hero p { color: #b0bec5; font-size: 14px; line-height: 1.6; max-width: 90%; margin: 15px auto; }

        .class-list h3 { font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #00d4ff; }
        .class-item { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            text-decoration: none; 
            color: white; 
            transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .class-item:hover { 
            background: rgba(255, 255, 255, 0.07); 
            transform: translateX(-5px); 
            border-color: #00d4ff; 
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        .active-blue { background: linear-gradient(90deg, #2e66ff, #6c5ce7); border: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="gate">
        <h2>أكاديمية سيف S.A.B</h2>
        <input type="tel" id="u" placeholder="رقم الهاتف">
        <input type="password" id="p" placeholder="تأكيد الرقم">
        <button class="btn-go" onclick="login()">دخول المنصة</button>
    </div>

    <div id="content">
        <div class="top-bar">
            <div class="logo-tag">S.A.B</div>
            <i class="fas fa-bars" style="font-size: 24px; cursor: pointer;"></i>
        </div>

        <div class="hero">
            <h1>اكاديميه سيف التعليميه</h1>
            <h2>تخصص BIS</h2>
            <p>طريقك للنجاح يبدأ من هنا، خبرة 6 سنين في مجال البرمجة وبقدم لك منصة شروحات جديدة لكل الفرق الدراسية.</p>
        </div>

        <div class="class-list">
            <h3><i class="fas fa-graduation-cap"></i> اختار فرقتك الدراسية</h3>
            
            <a href="level1.html" class="class-item active-blue">
                <span><i class="fas fa-book-open"></i> الفرقة الأولى</span>
                <i class="fas fa-chevron-left"></i>
            </a>
            <a href="level2.html" class="class-item">
                <span><i class="fas fa-code"></i> الفرقة الثانية</span>
                <i class="fas fa-chevron-left"></i>
            </a>
            <a href="level3.html" class="class-item">
                <span><i class="fas fa-microchip"></i> الفرقة الثالثة</span>
                <i class="fas fa-chevron-left"></i>
            </a>
            <a href="level5.html" class="class-item">
                <span><i class="fas fa-user-tie"></i> الفرقة الرابعة</span>
                <i class="fas fa-chevron-left"></i>
            </a>
        </div>
    </div>

<script>
const users = ["01096519733", "01024145579", "01557158858", "01016054679"]; // اختصار للتجربة

function login() {
    const valU = document.getElementById('u').value.trim();
    const valP = document.getElementById('p').value.trim();
    if (valU === valP && users.includes(valU)) {
        sessionStorage.setItem('access', 'done');
        render();
    } else { 
        alert("الرقم غير مسجل!"); 
    }
}

function render() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

window.onload = function() {
    if (sessionStorage.getItem('access') === 'done') render();
}
</script>
</body>
</html>
