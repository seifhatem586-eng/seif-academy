<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية د. سيف حاتم</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0f1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { background: #1c2230; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #2c3444; color: white; text-align: center; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        /* تنسيق منطقة المحتوى بعد الدخول */
        #mainContent { display: none; width: 100%; max-width: 900px; text-align: center; padding: 20px; }
        .section-box { background: #1c2230; padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #28a745; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #2c3444; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; text-decoration: none; color: white; display: block; }
        .card:hover { background: #28a745; transform: translateY(-5px); }
    </style>
</head>
<body>

    <div id="loginArea" class="login-container">
        <h2>أكاديمية د. سيف حاتم</h2>
        <p>سجل دخولك لمشاهدة محاضراتك</p>
        <input type="tel" id="p1" placeholder="رقم الموبايل">
        <input type="password" id="p2" placeholder="تأكيد الرقم">
        <button onclick="checkAccess()">دخول المنصة</button>
    </div>

    <div id="mainContent">
        <div class="section-box">
            <h1>مرحباً بك يا دكتور سيف</h1>
            <p>اختر الفرقة الدراسية لاستعراض المحتوى</p>
            
            <div class="grid">
                <a href="#" class="card">
                    <h3>الفرقة الأولى</h3>
                    <p>اضغط لاستعراض المواد</p>
                </a>
                
                <a href="#" class="card">
                    <h3>الفرقة الثانية</h3>
                    <p>اضغط لاستعراض المواد</p>
                </a>
            </div>
        </div>

        <div style="margin-top: 50px; color: #777; font-size: 12px;">
            <p>© 2026 Seif Academy – BIS Division</p>
        </div>
    </div>

<script>

function checkAccess() {
    const v1 = document.getElementById('p1').value.trim();
    const v2 = document.getElementById('p2').value.trim();
    if (v1 !== "" && v1 === v2 && allowedPhones.includes(v1)) {
        sessionStorage.setItem('isLogged', 'true');
        showMain();
    } else {
        alert("بيانات خاطئة!");
    }
}

function showMain() {
    document.getElementById('loginArea').style.display = 'none';
    document.body.style.alignItems = 'flex-start';
    document.getElementById('mainContent').style.display = 'block';
}

window.onload = function() {
    if (sessionStorage.getItem('isLogged') === 'true') showMain();
};
</script>
</body>
</html>
