<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>أكاديمية د. سيف حاتم</title>
    <style>
        /* ستايل شاشة القفل */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
        }
        input { padding: 10px; margin: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 30px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h2>منصة أكاديمية د. سيف حاتم</h2>
        <p>يرجى إدخال رقم الهاتف للتفعيل</p>
        <input type="tel" id="u" placeholder="رقم الهاتف">
        <input type="password" id="p" placeholder="تأكيد الرقم">
        <button id="loginBtn">تفعيل الدخول</button>
    </div>

    <div id="content" style="text-align: center; padding: 50px;">
        <h1>أهلاً بك يا دكتور في منصتك التعليمية</h1>
        <p>المحتوى الآن محمي ضد تصوير الشاشة</p>
    </div>

<script>
// 1. الأرقام المفعله
const allowed = ["01096519733", "01024145579", "01557158858", "01070425452", "01098776162", "01095053073", "01063030940", "01020301679", "01063413116", "01279154986", "01115106965", "01022398761", "01004532748", "01097169300", "01211396484", "01125096828", "01012365405", "01098588382", "01099007524", "01019264166", "01011060533", "01556057243", "01062103454", "01154082093", "01033432364", "01008365306", "01119373447", "01278588055", "01019575716", "01098709208", "01006826049", "01096561506", "01020323198", "01015172286", "01080543325", "01270625932", "01096343776", "01128044301", "01024839332", "01021081359", "01220857026", "01556774673", "01276586756", "01551866777", "01110650473", "01060360234", "01027212037", "01119874632", "01142365707", "01010491890", "01501553104", "01090941321", "01067230360", "01080797172", "01270743989", "01021269155", "01096628829", "01029196074", "01273500413", "01203092834", "01002496711", "01123503877", "01009670748", "01003730269", "01552983676", "01270331961", "01029195750", "01004587268", "01012140245", "01023378861", "01278528994", "01281067106", "01020347138", "01503440661", "01029574956", "01065563628", "01287252652", "01003152134", "01001610902", "01098065258", "01098457918", "01287853209", "01552983705"];

let attempts = 0;

// 2. تفعيل الدخول
document.getElementById('loginBtn').onclick = function() {
    const user = document.getElementById('u').value.trim();
    const pass = document.getElementById('p').value.trim();

    if (user && user === pass && allowed.includes(user)) {
        sessionStorage.setItem('ok', 'true');
        document.getElementById('loginOverlay').style.display = 'none';
        alert("تم التفعيل بنجاح!");
    } else {
        alert("الرقم خطأ أو غير مفعل!");
    }
};

// 3. فحص الدخول عند التحميل
window.onload = function() {
    if (sessionStorage.getItem('ok') === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
    }
};

// 4. حماية السكرين شوت
document.addEventListener('keyup', (e) => {
    if (e.key === 'PrintScreen' || e.keyCode === 44) {
        attempts++;
        navigator.clipboard.writeText('محتوى محمي');
        if (attempts === 1) alert("⚠️ تحذير: التصوير ممنوع!");
        else {
            alert("❌ محاولة متكررة. سيتم خروجك.");
            sessionStorage.clear();
            location.reload();
        }
    }
});
</script>

</body>
</html>
