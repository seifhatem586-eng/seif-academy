<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.B - أكاديمية سيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التعديل الجوهري في الخلفية والخطوط */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d); /* خلفية حماسية زي الألعاب */
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        /* شاشة الدخول بنمط الزجاج الملون */
        #gate { 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            width: 90%; 
            max-width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #gate h2 { 
            font-size: 28px; 
            color: #fff; 
            margin-bottom: 30px; 
            text-shadow: 0 0 15px #fdbb2d;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 15px; 
            border: none; 
            background: rgba(255, 255, 255, 0.9); 
            color: #333; 
            font-size: 18px; 
            font-weight: bold;
            box-sizing: border-box;
            outline: none;
        }

        .btn-go { 
            width: 100%; 
            padding: 16px; 
            background: #fdbb2d; 
            color: #000; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 20px; 
            margin-top: 15px; 
            transition: 0.3s;
        }

        .btn-go:hover { transform: scale(1.05); background: #fff; }

        /* ستايل المنصة الداخلي */
        #content { display: none; width: 100%; max-width: 500px; padding: 20px; animation: slideUp 0.6s; }
        .hero h2 { font-size: 40px; color: #fdbb2d; text-shadow: 2px 2px #000; }
        
        .stat-box { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 20px;
            transition: 0.3s;
        }
        .stat-box:hover { background: #fdbb2d; color: #000; }

        .class-item { 
            background: white; 
            color: black; 
            font-weight: bold; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            text-decoration: none;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="gate">
        <h2>أكاديمية سيف S.A.B</h2>
        <input type="tel" id="u" placeholder="رقم الموبايل">
        <input type="password" id="p" placeholder="كلمة السر">
        <button class="btn-go" onclick="login()">دخول الحريف</button>
    </div>

    <div id="content">
        <div class="hero">
            <h2>S.A.B</h2>
            <p style="font-size: 18px;">أهلاً بك في أكاديمية المهندس سيف</p>
        </div>

        <div style="display: flex; gap: 10px; margin: 20px 0;">
            <div class="stat-box" style="flex:1; padding:15px; text-align:center;"><h3>88</h3><span>فيديو</span></div>
            <div class="stat-box" style="flex:1; padding:15px; text-align:center;"><h3>24</h3><span>PDF</span></div>
        </div>

        <div class="class-list">
            <a href="#" class="class-item" style="background: #fdbb2d;"><span>الفرقة الأولى</span> <i class="fas fa-play"></i></a>
            <a href="#" class="class-item"><span>الفرقة الثانية</span> <i class="fas fa-lock"></i></a>
            <a href="#" class="class-item"><span>الفرقة الثالثة</span> <i class="fas fa-lock"></i></a>
        </div>
    </div>

<script>
const users = ["01096519733", "01024145579", "01557158858", "01016054679"]; // اختصرت القائمة للتجربة

function login() {
    const valU = document.getElementById('u').value.trim();
    const valP = document.getElementById('p').value.trim();
    if (valU === valP && (valU === "01096519733" || users.includes(valU))) {
        sessionStorage.setItem('access', 'done');
        render();
    } else { alert("يا هندسة الرقم ده مش عندنا!"); }
}

function render() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.body.style.display = 'block'; 
}

window.onload = function() {
    if (sessionStorage.getItem('access') === 'done') render();
}
</script>
</body>
</html>
