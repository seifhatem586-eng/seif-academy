<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية سيف التعليمية - BIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* شاشة الدخول */
        #loginGate { background: #1c2230; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #2c3444; color: white; text-align: center; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #2a69ff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* تصميم المنصة الأصلية (S.A.B) */
        #mainPlatform { display: none; width: 95%; max-width: 500px; text-align: center; padding: 20px; }
        .header-logo { background: #1c2230; display: inline-block; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 24px; margin-bottom: 30px; float: left; }
        .title-section { margin-top: 60px; }
        .title-section h1 { color: #5bc0de; font-size: 28px; margin-bottom: 5px; }
        .title-section h2 { font-size: 32px; margin-top: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 30px 0; }
        .stat-card { background: #1c2230; padding: 20px 10px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .stat-card h3 { font-size: 28px; margin: 0; color: #5bc0de; }
        .stat-card p { font-size: 12px; color: #777; margin: 5px 0 0; }
        
        .class-selection h3 { font-size: 22px; margin-bottom: 20px; }
        .class-btn { background: #1c2230; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; transition: 0.3s; border: 1px solid transparent; }
        .class-btn:hover { border-color: #2a69ff; transform: scale(1.02); }
        .btn-active { background: linear-gradient(90deg, #2a69ff, #6c5ce7); }
        .class-btn i { font-size: 20px; }
    </style>
</head>
<body>

    <div id="loginGate">
        <h2 style="color: #5bc0de;">أكاديمية سيف S.A.B</h2>
        <input type="tel" id="user" class="login-input" placeholder="رقم الهاتف">
        <input type="password" id="pass" class="login-input" placeholder="تأكيد الرقم">
        <button class="login-btn" onclick="go()">دخول</button>
    </div>

    <div id="mainPlatform">
        <div class="header-logo">S.A.B</div>
        
        <div class="title-section">
            <h1>اكاديميه سيف التعليميه</h1>
            <h2>تخصص BIS</h2>
            <p style="color: #aaa; font-size: 14px;">طريقك للنجاح يبدأ من هنا، خبرة 6 سنين في مجال البرمجة وبقدم لك منصة شروحات جديدة لكل الفرق الدراسية.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>88</h3><p>فيديو</p></div>
            <div class="stat-card"><h3>24</h3><p>ملف PDF</p></div>
            <div class="stat-card"><h3>0</h3><p>بوست</p></div>
        </div>

        <div class="class-selection">
            <h3><i class="fas fa-user-graduate"></i> اختار فرقتك الدراسية</h3>
            <a href="#" class="class-btn btn-active">
                <i class="fas fa-book"></i> <span>الفرقة الأولى</span>
            </a>
            <a href="#" class="class-btn">
                <i class="fas fa-code"></i> <span>الفرقة الثانية</span>
            </a>
            <a href="#" class="class-btn">
                <i class="fas fa-microchip"></i> <span>الفرقة الثالثة</span>
            </a>
            <a href="#" class="class-btn">
                <i class="fas fa-user-tie"></i> <span>الفرقة الرابعة</span>
            </a>
        </div>
    </div>

<script>
const allowed = ["01096519733", "01024145579", "01557158858", "01070425452", "01098776162", "01095053073", "01063030940", "01020301679", "01063413116", "01279154986", "01115106965", "01022398761", "01004532748", "01097169300", "01211396484", "01125096828", "01012365405", "01098588382", "01099007524", "01019264166", "01011060533", "01556057243", "01062103454", "01154082093", "01033432364", "01008365306", "01119373447", "01278588055", "01019575716", "01098709208", "01006826049", "01096561506", "01020323198", "01015172286", "01080543325", "01270625932", "01096343776", "01128044301", "01024839332", "01021081359", "01220857026", "01556774673", "01276586756", "01551866777", "01110650473", "01060360234", "01027212037", "01119874632", "01142365707", "01010491890", "01501553104", "01090941321", "01067230360", "01080797172", "01270743989", "01021269155", "01096628829", "01029196074", "01273500413", "01203092834", "01002496711", "01123503877", "01009670748", "01003730269", "01552983676", "01270331961", "01029195750", "01004587268", "01012140245", "01023378861", "01278528994", "01281067106", "01020347138", "01503440661", "01029574956", "01065563628", "01287252652", "01003152134", "01001610902", "01098065258", "01098457918", "01287853209", "01552983705", "01012084505", "01015524734", "01010933038", "01552247079", "01025431723", "01097067165", "01099517891", "01067984698", "01019684503", "01090828974", "01008901773", "01010822817", "01067182270", "01099441648", "01011047913", "01069177282", "01096486471", "01284655168", "01065362869", "01149213341", "01068291040", "01559173294", "01015541907", "01113534996", "01002148488", "01281022388", "01029091725", "01017678227", "01016054679"];

function go() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    if (u === p && allowed.includes(u)) {
        sessionStorage.setItem('ok', '1');
        show();
    } else { alert("خطأ في البيانات!"); }
}

function show() {
    document.getElementById('loginGate').style.display = 'none';
    document.body.style.alignItems = 'flex-start';
    document.getElementById('mainPlatform').style.display = 'block';
}

window.onload = function() {
    if (sessionStorage.getItem('ok') === '1') show();
}
</script>
</body>
</html>
