<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة واجهة أكاديمية دكتور سيف</title>
    <style>
        /* تأثير زجاجي فخم للكروت العلوية (فيديو، PDF، بوست) */
.stat-card, .counter-card { /* استبدل هذه الكلاسات بأسماء كلاسات الكروت العلوية عندك لو مختلفة */
    background: rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease-in-out;
}

/* توهج الأرقام العلوية بالنيون */
.stat-card h3, .stat-card span, .counter-number { 
    text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
    font-weight: bold;
}

/* تأثير صفوف الفرق الدراسية (الفرقة الأولى، الثانية...) */
.level-btn, .year-card { /* استبدل هذا الكلاس بالاسم المكتوب لصفوف الفرق عندك */
    background: rgba(255, 255, 255, 0.02) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    position: relative;
    overflow: hidden;
}

/* الحركة السحرية والنيون الملون عند مرور الماوس على الفرقة */
.level-btn:hover {
    transform: scale(1.02) translateY(-2px);
    border-color: #00f2fe !important; /* النيون الأزرق المشرق */
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.4), inset 0 0 10px rgba(0, 242, 254, 0.2) !important;
    color: #fff !important;
}

/* لتنويع الألوان: يمكنك إعطاء الفرقة الثانية نيون فوشيا */
.level-btn.second-year:hover {
    border-color: #ff007f !important;
    box-shadow: 0 0 20px rgba(255, 0, 127, 0.4), inset 0 0 10px rgba(255, 0, 127, 0.2) !important;
}
        /* الخلفية الرقمية الغامقة */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05020a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* عنوان الأكاديمية المشع */
        .brand-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe, 0 0 40px #00f2fe;
            margin-bottom: 50px;
            text-align: center;
        }

        /* حاوية الكروت الزجاجية */
        .cards-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* كرت المادة بالتأثير الزجاجي والنيون (Glassmorphism) */
        .course-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            width: 280px;
            text-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            transition: all 0.4s ease-in-out;
            cursor: pointer;
        }

        /* حركة النيون والارتفاع عند مرور الماوس */
        .course-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4), inset 0 0 15px rgba(79, 172, 254, 0.2);
        }

        /* الأيقونات التفاعلية المضيئة */
        .icon-box {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 15px #00f2fe;
            transition: transform 0.4s;
        }

        .course-card:hover .icon-box {
            transform: rotateY(360deg);
        }

        /* نصوص الكروت */
        .course-card h3 {
            margin: 15px 0 10px;
            font-size: 1.5rem;
            color: #fff;
        }

        .course-card p {
            font-size: 0.9rem;
            color: #b0a8bf;
            line-height: 1.6;
        }

        /* كرت الفرقة الثانية بنظام نيون فوشيا */
        .card-pink .icon-box {
            background: linear-gradient(135deg, #ff007f 0%, #ff007f 100%);
            box-shadow: 0 0 15px #ff007f;
        }
        .card-pink:hover {
            border-color: #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4), inset 0 0 15px rgba(255, 0, 127, 0.2);
        }
    </style>
</head>
<body>

    <div class="brand-title">✨ أكاديمية دكتور سيف الرمزية ✨</div>

    <div class="cards-container">
        <!-- كرت الفرقة الأولى نيون أزرق سيبير -->
        <div class="course-card">
            <div class="icon-box">📘</div>
            <h3>الفرقة الأولى</h3>
            <p>ادخل وشوف المحاضرات والملخصات جرافيك بالكامل بتأثيرات النيون الذكية.</p>
        </div>

        <!-- كرت الفرقة الثانية نيون فوشيا سيبير -->
        <div class="course-card card-pink">
            <div class="icon-box">🔬</div>
            <h3>الفرقة الثانية</h3>
            <p>امتحانات تفاعلية سريعة، كروت زجاجية مضيئة تفاعلية مع لمسات الماوس.</p>
        </div>
    </div>

</body>
</html>
