<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية د. سيف حاتم</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0f1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #1c2230; padding: 40px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #2c3444; color: white; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        /* تصميم المنصة القديم اللي كان في صورتك */
        #myPlatform { display: none; width: 100%; max-width: 900px; text-align: center; padding: 20px; }
        .hero-section { background: rgba(28, 34, 48, 0.9); padding: 30px; border-radius: 20px; border: 1px solid #444; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .class-card { padding: 40px 20px; border-radius: 15px; text-decoration: none; color: white; transition: 0.3s; font-weight: bold; }
        .first-year { background: #4CAF50; } /* اللون الأخضر للفرقة الأولى */
        .second-year { background: #3b4b6b; } /* اللون الأزرق للفرقة الثانية */
        .class-card:hover { transform: scale(1.05); opacity: 0.9; }
        footer { margin-top: 40px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loginGate" class="login-box">
        <h2 style="color: #28a745;">أكاديمية د. سيف حاتم</h2>
        <p>برجاء إدخال الرقم الموحد للدخول</p>
        <input type="tel" id="userIn" placeholder="رقم الموبايل">
        <input type="password" id="passIn" placeholder="تأكيد الرقم">
        <button onclick="unlock()">دخول المنصة</button>
    </div>

    <div id="myPlatform">
        <div class="hero-section">
            <h1 style="font-size: 32px;">مرحباً بك يا دكتور سيف</h1>
            <p style="color: #ccc;">اختر الفرقة الدراسية لاستعراض المحتوى</p>
            
            <div class="grid-layout">
                <a href="first-year.html" class="class-card first-year">
                    <h2 style="margin:0;">الفرقة الأولى</h2>
                    <p style="margin-top:10px; font-weight: normal;">اضغط لاستعراض المواد</p>
                </a>
                
                <a href="second-year.html" class="class-card second-year">
                    <h2 style="margin:0;">الفرقة الثانية</h2>
                    <p style="margin-top:10px; font-weight: normal;">اضغط لاستعراض المواد</p>
                </a>
            </div>
        </div>
        <footer>Seif Academy – BIS Division 2026 ©</footer>
    </div>

<script>

function unlock() {
    const u = document.getElementById('userIn').value.trim();
    const p = document.getElementById('passIn').value.trim();
    if (u !== "" && u === p && allowed.includes(u)) {
        sessionStorage.setItem('done', 'true');
        showMe();
    } else {
        alert("الرقم خطأ!");
    }
}

function showMe() {
    document.getElementById('loginGate').style.display = 'none';
    document.body.style.alignItems = 'flex-start';
    document.getElementById('myPlatform').style.display = 'block';
}

window.onload = function() {
    if (sessionStorage.getItem('done') === 'true') showMe();
};
</script>
</body>
</html>
