<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أكاديمية د. سيف حاتم</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding-top: 100px; }
        .box { background: #2c2c2c; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 0 20px black; }
        input { display: block; margin: 15px auto; padding: 12px; width: 250px; border-radius: 8px; border: none; text-align: center; font-size: 16px; }
        button { padding: 12px 40px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginArea" class="box">
        <h2>تسجيل دخول الطلاب</h2>
        <input type="tel" id="p1" placeholder="أدخل رقم الموبايل">
        <input type="password" id="p2" placeholder="تأكيد الرقم">
        <button onclick="validate()">تفعيل الدخول</button>
    </div>

    <div id="content" style="display:none;">
        <h1>أهلاً بك يا دكتور</h1>
        <p>المحتوى محمي الآن ضد التصوير.</p>
    </div>

<script>
// قائمة الأرقام المحدثة والمنظمة
const phones = [
    "01096519733", "01024145579", "01557158858", "01070425452", "01098776162",
    "01095053073", "01063030940", "01020301679", "01063413116", "01279154986",

    "01008365306", "01119373447", "01278588055", "01019575716", "01098709208",
    "01006826049", "01096561506", "01020323198", "01015172286", "01080543325",
    "01270625932", "01096343776", "01128044301", "01024839332", "01021081359",
    "01220857026", "01556774673", "01276586756", "01551866777", "01110650473",
    "01060360234", "01027212037", "01119874632", "01142365707", "01010491890",
    "01501553104", "01090941321", "01067230360", "01080797172", "01270743989",
    "01021269155", "01096628829", "01029196074", "01273500413", "01203092834",
    "01002496711", "01123503877", "01009670748", "01003730269", "01552983676",
    "01270331961", "01029195750", "01004587268", "01012140245", "01023378861",

    "01010933038", "01552247079", "01025431723", "01097067165", "01099517891",
    "01067984698", "01019684503", "01090828974", "01008901773", "01010822817",

    "01015541907", "01113534996", "01002148488", "01281022388", "01029091725",
    "01017678227", "01016054679"
];

function validate() {
    const val1 = document.getElementById('p1').value.trim();
    const val2 = document.getElementById('p2').value.trim();
    
    if (val1 !== "" && val1 === val2 && phones.includes(val1)) {
        sessionStorage.setItem('access', 'true');
        showContent();
        alert("تم التفعيل!");
    } else {
        alert("بيانات خاطئة أو رقم غير مفعل!");
    }
}

function showContent() {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

window.onload = function() {
    if (sessionStorage.getItem('access') === 'true') showContent();
    
    // حماية سكرين شوت
    document.addEventListener('keyup', (e) => {
        if (e.key === 'PrintScreen' || e.keyCode === 44) {
            alert("⚠️ التصوير ممنوع!");
            sessionStorage.clear();
            location.reload();
        }
    });
};
</script>
</body>
</html>
