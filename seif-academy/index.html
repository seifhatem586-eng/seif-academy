<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية د. سيف حاتم</title>
    <style>
        /* ستايل الصفحة */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1e1e1e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; }
        h2 { color: #28a745; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; font-size: 16px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; }
        #mainContent { display: none; width: 100%; max-width: 800px; text-align: center; padding: 20px; }
        .video-container { margin-top: 20px; background: #1e1e1e; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="loginArea" class="container">
        <h2>أكاديمية د. سيف حاتم</h2>
        <p>يرجى إدخال رقم الموبايل المفعّل</p>
        <input type="tel" id="phone1" placeholder="رقم الموبايل">
        <input type="password" id="phone2" placeholder="تأكيد الرقم">
        <button onclick="checkAccess()">دخول المنصة</button>
    </div>

    <div id="mainContent">
        <div class="video-container">
            <h1>مرحباً بك يا دكتور</h1>
            <p>تم تسجيل دخولك بنجاح. يمكنك الآن مشاهدة المحتوى.</p>
            <hr style="border: 0.5px solid #333;">
            
            <div style="padding: 20px; background: #2c2c2c; border-radius: 10px; margin-top: 20px;">
                <h3>محاضرات اليوم</h3>
                <p>سيتم رفع المحتوى هنا قريباً...</p>
            </div>
        </div>
    </div>

function checkAccess() {
    const p1 = document.getElementById('phone1').value.trim();
    const p2 = document.getElementById('phone2').value.trim();

    if (p1 !== "" && p1 === p2 && allowedPhones.includes(p1)) {
        sessionStorage.setItem('isLogged', 'true');
        showMain();
    } else {
        alert("خطأ: الرقم غير مسجل أو البيانات غير متطابقة.");
    }
}

function showMain() {
    document.getElementById('loginArea').style.display = 'none';
    document.body.style.alignItems = 'flex-start'; // لضبط شكل المحتوى
    document.getElementById('mainContent').style.display = 'block';
}

// فحص إذا كان مسجل دخول مسبقاً
window.onload = function() {
    if (sessionStorage.getItem('isLogged') === 'true') {
        showMain();
    }
};
</script>

</body>
</html>
