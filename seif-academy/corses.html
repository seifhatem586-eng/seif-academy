<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كورسات البرمجة - أكاديمية سيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b111e;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .course-card {
            background: #161d2b;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid #1e2638;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .course-card:hover {
            transform: scale(1.02);
            border-color: #6c5ce7;
        }
        .course-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .course-icon {
            font-size: 22px;
            color: #6c5ce7;
        }
        .course-title {
            font-size: 17px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color: #57ccff; text-align: center; margin-bottom: 30px;"><i class="fas fa-laptop-code"></i> مسارات كورس البرمجة</h1>

        <a href="course_view.html?course=html" class="course-card">
            <div class="course-info">
                <div class="course-icon"><i class="fab fa-html5"></i></div>
                <div class="course-title">كورس HTML من الصفر</div>
            </div>
            <i class="fas fa-chevron-left" style="color: #6c5ce7;"></i>
        </a>

        <a href="course_view.html?course=css" class="course-card">
            <div class="course-info">
                <div class="course-icon"><i class="fab fa-css3-alt"></i></div>
                <div class="course-title">كورس CSS للتصميم والتنسيق</div>
            </div>
            <i class="fas fa-chevron-left" style="color: #6c5ce7;"></i>
        </a>
    </div>

</body>
</html>
