<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة شروحات الفيديوهات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111e; color: white; margin: 0; padding: 20px; box-sizing: border-box; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #57ccff; margin-bottom: 30px; }
        #sharing-panel { background: #161d2b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #2a3547; background: #0b111e; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 14px; background: #2e66ff; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }
        .btn-back { display: inline-block; padding: 12px 30px; background: #00adb5; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 20px; }
        .video-list { margin-top: 30px; text-align: right; }
        
        /* التعديل الجديد بشكل الكارت علشان يشيل الزرارين جمب بعض */
        .video-card { background: #161d2b; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #2a3547; display: flex; justify-content: space-between; align-items: center; }
        .video-info { flex-grow: 1; text-align: right; }
        .video-card h3 { margin: 0; color: #fff; font-size: 18px; }
        .actions-btn { display: flex; gap: 10px; }
        
        .video-btn { padding: 8px 15px; background: #00adb5; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        
        /* زرار الحذف الجديد باللون الأحمر */
        .delete-btn { padding: 8px 15px; background: #ff2e63; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #57ccff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 منصة مشاركة الشروحات والملفات</h1>

    <div id="sharing-panel">
        <h3>➕ شارك فيديو أو شرح مع زمايلك</h3>
        <input type="text" id="video-title" placeholder="اكتب عنوان الشرح أو الدرس هنا...">
        <input type="url" id="video-url" placeholder="ضع رابط الفيديو أو الشرح هنا...">
        <button class="btn-add" onclick="addNewVideo()">نشر للجميع 🚀</button>
    </div>

    <h2>📺 الشروحات المتوفرة من الطلاب</h2>
    <div id="loader" class="loader"></div>
    <div id="video-container" class="video-list"></div>

    <a href="index.html" class="btn-back">العودة للرئيسية</a>
</div>

<script>
// 🔴 حط رابط الـ Web App اللي نسخته من جوجل هنا بين العلامتين ''
const scriptURL = 'اكتب_رابط_الـ_Web_App_هنا';

window.onload = function() {
    if (localStorage.getItem('access') !== 'done') {
        window.location.href = 'index.html';
        return;
    }
    loadVideos();
}

function loadVideos() {
    document.getElementById("loader").style.display = "block";
    
    fetch(scriptURL)
    .then(res => res.json())
    .then(videos => {
        document.getElementById("loader").style.display = "none";
        const container = document.getElementById("video-container");
        container.innerHTML = "";

        if(videos.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#8a96a3;'>لا توجد شروحات مشاركة حالياً. كن أول من يشارك!</p>";
            return;
        }

        localStorage.setItem('myVideos', JSON.stringify(videos));

        // هنا بنرسم الكارت وبنحط جواه زرار الفتح وزرار الحذف الجديد
        videos.forEach(vid => {
            const card = document.createElement("div");
            card.className = "video-card";
            card.innerHTML = `
                <div class="video-info">
                    <h3>${vid.title}</h3>
                </div>
                <div class="actions-btn">
                    <a href="${vid.url}" target="_blank" class="video-btn"><i class="fas fa-play"></i> فتح</a>
                    <button class="delete-btn" onclick="deleteVideo('${vid.title}', '${vid.url}')"><i class="fas fa-trash"></i> حذف</button>
                </div>
            `;
            container.appendChild(card);
        });
    })
    .catch(err => {
        document.getElementById("loader").style.display = "none";
        console.error("خطأ:", err);
    });
}

function addNewVideo() {
    const title = document.getElementById("video-title").value.trim();
    const url = document.getElementById("video-url").value.trim();

    if (!title || !url) {
        alert("برجاء كتابة العنوان والرابط أولاً!");
        return;
    }

    const data = { action: "addVideo", title: title, url: url };
    alert("جاري النشر والمشاركة مع باقي الطلاب...");

    fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("✅ تم نشر الشرح وهيظهر عند كل الطلاب في نفس اللحظة!");
        document.getElementById("video-title").value = "";
        document.getElementById("video-url").value = "";
        loadVideos();
    })
    .catch(err => alert("❌ حدث خطأ، جرب تاني."));
}

function deleteVideo(title, url) {
    if(!confirm("هل أنت متأكد إنك عايز تحذف الفيديو ده من عند كل الطلاب؟")) return;

    const data = { action: "deleteVideo", title: title, url: url };
    alert("جاري الحذف من السيرفر...");

    fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("🗑️ تم حذف الفيديو بنجاح من عند الكل.");
        loadVideos();
    })
    .catch(err => alert("❌ فشل الحذف، جرب تاني."));
}
</script>

</body>
</html>
