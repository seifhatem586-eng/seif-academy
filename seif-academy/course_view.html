<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروس المسار الدراسي - أكاديمية سيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0b111e; 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            margin-top: 20px; 
        }
        .back-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            color: #8a96a3; 
            text-decoration: none; 
            font-size: 16px; 
            margin-bottom: 25px; 
        }
        .playlist { 
            background: #161d2b; 
            border-radius: 18px; 
            padding: 20px; 
            border: 1px solid #1e2638; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .playlist h3 { 
            margin: 0; 
            color: #57ccff; 
            font-size: 20px; 
            border-bottom: 1px solid #1e2638; 
            padding-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .playlist-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 16px; 
            border-radius: 12px; 
            text-decoration: none;
            color: white;
            transition: 0.3s; 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .playlist-item:hover { 
            background: rgba(87, 204, 255, 0.1); 
            border-color: rgba(87, 204, 255, 0.2); 
            transform: scale(1.01);
        }
        .item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .playlist-item i.fa-play-circle {
            color: #6c5ce7;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- زرار الرجوع -->
        <a href="corses.html" class="back-btn"><i class="fas fa-arrow-right"></i> الرجوع لقائمة الكورسات</a>
        
        <!-- صندوق الدروس المظبوط -->
        <div class="playlist">
            <h3><i class="fas fa-list"></i> دروس المسار الدراسي</h3>
            
            <!-- كل اللي عليك تغير الكلمة اللي بالعربي وتحط لينك الفيديو بتاعك مكان علامة # -->
            <a href="#" target="_blank" class="playlist-item">
                <div class="item-right">
                    <i class="fas fa-play-circle"></i>
                    <span>الفيديو الأول: مقدمة عن المسار</span>
                </div>
                <i class="fas fa-external-link-alt" style="font-size: 14px; color: #8a96a3;"></i>
            </a>

            <a href="#" target="_blank" class="playlist-item">
                <div class="item-right">
                    <i class="fas fa-play-circle"></i>
                    <span>الفيديو الثاني: أساسيات البداية</span>
                </div>
                <i class="fas fa-external-link-alt" style="font-size: 14px; color: #8a96a3;"></i>
            </a>

            <a href="#" target="_blank" class="playlist-item">
                <div class="item-right">
                    <i class="fas fa-play-circle"></i>
                    <span>الفيديو الثالث: التطبيق العملي الأول</span>
                </div>
                <i class="fas fa-external-link-alt" style="font-size: 14px; color: #8a96a3;"></i>
            </a>

            <!-- تقدر تكرر السطر ده عشان تزود فيديوهات رابع وخامس براحتك -->
        </div>
    </div>

</body>
</html>
