<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروس المسار الدراسي - أكاديمية سيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111e; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; margin-top: 20px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #8a96a3; text-decoration: none; font-size: 16px; margin-bottom: 25px; }
        .playlist { background: #161d2b; border-radius: 18px; padding: 20px; border: 1px solid #1e2638; display: flex; flex-direction: column; gap: 12px; }
        .playlist h3 { margin: 0; color: #57ccff; font-size: 20px; border-bottom: 1px solid #1e2638; padding-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .playlist-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-radius: 12px; text-decoration: none; color: white; transition: 0.3s; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; }
        .playlist-item:hover { background: rgba(87, 204, 255, 0.1); border-color: rgba(87, 204, 255, 0.2); transform: scale(1.01); }
        .item-right { display: flex; align-items: center; gap: 12px; }
        .playlist-item i.fa-play-circle { color: #6c5ce7; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="corses.html" class="back-btn"><i class="fas fa-arrow-right"></i> الرجوع لقائمة الكورسات</a>
        
        <div class="playlist">
            <h3 id="course-title"><i class="fas fa-list"></i> دروس المسار الدراسي</h3>
            <div id="playlist-items"></div>
        </div>
    </div>

    <script>
        // داتا الكورسات: لو الـ url فاضية "" هيقول للطالب عفواً لا يوجد فيديوهات. لو حطيت اللينك هيفتح علطول!
        const coursesData = {
            html: {
                title: "دروس كورس HTML",
                videos: [
                    { title: "الفيديو الأول: مقدمة وتجهيز البيئة", url: "" }, // ده فاضي وهيطلع الرسالة
                    { title: "الفيديو الثاني: شرح العناوين والفقرات", url: "https://youtube.com/..." }, // ده شغال وهيفتح يوتيوب
                    { title: "الفيديو الثالث: إضافة الروابط والصور", url: "" } 
                ]
            },
            css: {
                title: "دروس كورس CSS",
                videos: [
                    { title: "الفيديو الأول: مقدمة في التنسيق", url: "" }
                ]
            },
            js: { title: "دروس كورس JavaScript", videos: [{ title: "الفيديو الأول", url: "" }] },
            python: { title: "دروس كورس Python", videos: [{ title: "الفيديو الأول", url: "" }] },
            csharp: { title: "دروس كورس C#", videos: [{ title: "الفيديو الأول", url: "" }] },
            cpp: { title: "دروس كورس C++", videos: [{ title: "الفيديو الأول", url: "" }] },
            database: { title: "دروس كورس قواعد البيانات", videos: [{ title: "الفيديو الأول", url: "" }] },
            data_analysis: { title: "دروس كورس تحليل البيانات", videos: [{ title: "الفيديو الأول", url: "" }] },
            sql_server: { title: "دروس كورس SQL Server", videos: [{ title: "الفيديو الأول", url: "" }] },
            php: { title: "دروس كورس PHP", videos: [{ title: "الفيديو الأول", url: "" }] },
            frontend: { title: "دروس مسار Front-End", videos: [{ title: "الفيديو الأول", url: "" }] },
            backend: { title: "دروس مسار Back-End", videos: [{ title: "الفيديو الأول", url: "" }] },
            flutter: { title: "دروس كورس Flutter", videos: [{ title: "الفيديو الأول", url: "" }] },
            ui_ux: { title: "دروس كورس UI - UX", videos: [{ title: "الفيديو الأول", url: "" }] }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const courseKey = urlParams.get('course') || 'html';
        const currentCourse = coursesData[courseKey] || coursesData['html'];

        document.getElementById('course-title').innerHTML = `<i class="fas fa-list"></i> ${currentCourse.title}`;
        const container = document.getElementById('playlist-items');
        
        currentCourse.videos.forEach(video => {
            const item = document.createElement('div');
            item.className = "playlist-item";
            item.innerHTML = `
                <div class="item-right">
                    <i class="fas fa-play-circle"></i>
                    <span>${video.title}</span>
                </div>
                <i class="fas fa-external-link-alt" style="font-size: 14px; color: #8a96a3;"></i>
            `;
            
            // هنا الذكاء: لما الطالب يضغط على الفيديو
            item.onclick = function() {
                if (video.url === "") {
                    // لو الخانة فاضية طلع الرسالة دي
                    alert("عفواً، لا توجد فيديوهات حالياً لهذا الدرس يا لورد! ✋");
                } else {
                    // لو فيها لينك افتحه في صفحة جديدة
                    window.open(video.url, '_blank');
                }
            };
            
            container.appendChild(item);
        });
    </script>
</body>
</html>
